<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Театр клоунады «Микос» | Заказчикам</title>
    <link rel="icon" type="image/svg+xml" href="SVG/logo-2.svg" sizes="any">
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dash-icon {
            width: 20px;
            height: 16px;
            margin-right: 8px;
            vertical-align: middle;
        }
        /* Стили валидации и модального окна */
        .form-input-customers.error,
        .form-select-customers.error,
        textarea.error {
            border-color: #E8454D !important;
            background-color: #FFF5F5;
        }
        .form-input-customers.valid,
        textarea.valid {
            border-color: #2E7D32 !important;
        }
        .error-message {
            display: none;
            color: #E8454D;
            font-size: 12px;
            font-family: 'Nunito Sans', sans-serif;
            margin-top: 6px;
            padding-left: 4px;
        }
        .error-message.visible {
            display: block;
            animation: slideDown 0.2s ease;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Модальное окно успеха */
        .success-modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 10001;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            padding: 20px; box-sizing: border-box;
        }
        .success-modal-overlay.active {
            opacity: 1; visibility: visible;
        }
        .success-modal-content {
            background: #FFFFFF;
            border-radius: 24px;
            max-width: 480px; width: 100%;
            padding: 40px 32px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(232, 69, 77, 0.2);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }
        .success-modal-overlay.active .success-modal-content {
            transform: scale(1);
        }
        .success-icon {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #E8454D, #D62830);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px;
            animation: pulse 0.6s ease-out;
        }
        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .success-icon i { font-size: 36px; color: white; }
        .success-modal-title {
            font-family: 'Unbounded', sans-serif;
            font-size: 24px; font-weight: 700; color: #1A1718;
            margin-bottom: 12px;
        }
        .success-modal-text {
            font-family: 'Nunito Sans', sans-serif;
            font-size: 16px; color: #5A5556; line-height: 1.5;
            margin-bottom: 28px;
        }
        .success-modal-btn {
            background: #E8454D;
            color: white; border: none;
            padding: 14px 32px; border-radius: 10px;
            font-family: 'Unbounded', sans-serif; font-weight: 600; font-size: 15px;
            cursor: pointer; transition: all 0.2s;
            display: inline-flex; align-items: center; gap: 8px;
        }
        .success-modal-btn:hover {
            background: #D62830; transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(232, 69, 77, 0.3);
        }
        .success-modal-close {
            position: absolute; top: 16px; right: 16px;
            width: 32px; height: 32px; border-radius: 50%;
            background: #F8F7F6; border: 1px solid #E5E3E1;
            color: #5A5556; font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
        }
        .success-modal-close:hover { background: #E8454D; color: white; border-color: #E8454D; }

        /* Адаптивность */
        @media (max-width: 480px) {
            .success-modal-content { padding: 32px 24px; }
            .success-icon { width: 70px; height: 70px; }
            .success-icon i { font-size: 30px; }
            .success-modal-title { font-size: 20px; }
            .success-modal-text { font-size: 15px; }
        }
    </style>
</head>
<body>
<div class="shop-container">
    <div id="site-header"></div>
    
    <div class="mobile-nav" id="mobileNav"> ... </div> <!-- без изменений -->
    <div class="overlay" id="overlay"></div>

    <main class="customers-page">
        <!-- Весь контент как в исходном коде, полностью сохранён -->
        <!-- ... все секции ... -->
    </main>

    <div id="site-footer"></div>
</div>

<!-- Модальное окно успеха -->
<div class="success-modal-overlay" id="successModal">
    <div class="success-modal-content">
        <button class="success-modal-close" id="successModalCloseBtn">&times;</button>
        <div class="success-icon"><i class="fas fa-check"></i></div>
        <h3 class="success-modal-title" id="successModalTitle">Заявка отправлена!</h3>
        <p class="success-modal-text" id="successModalText">Спасибо! Наш менеджер свяжется с вами.</p>
        <button class="success-modal-btn" id="successModalBtn"><i class="fas fa-times"></i> Закрыть</button>
    </div>
</div>

<script src="js/components-loader.js"></script>
<script src="js/header-scripts.js"></script>
<script src="js/common.js"></script>
<script>
(function() {
    // ===== МОДАЛЬНОЕ ОКНО =====
    const successModal = document.getElementById('successModal');
    const successModalClose = document.getElementById('successModalCloseBtn');
    const successModalBtn = document.getElementById('successModalBtn');
    const successTitle = document.getElementById('successModalTitle');
    const successText = document.getElementById('successModalText');

    function openSuccessModal(title, text) {
        successTitle.textContent = title;
        successText.textContent = text;
        successModal.classList.add('active');
        document.body.style.overflow = 'hidden';
    }
    function closeSuccessModal() {
        successModal.classList.remove('active');
        document.body.style.overflow = '';
    }
    successModalClose?.addEventListener('click', closeSuccessModal);
    successModalBtn?.addEventListener('click', closeSuccessModal);
    successModal?.addEventListener('click', (e) => { if (e.target === successModal) closeSuccessModal(); });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && successModal?.classList.contains('active')) closeSuccessModal();
    });

    // ===== ВАЛИДАЦИЯ =====
    const validators = {
        name: (val) => val.trim().length >= 2,
        email: (val) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val.trim()),
        phone: (val) => { const d = val.replace(/\D/g, ''); return d.length === 11 && d.startsWith('7'); },
        message: (val) => val.trim().length >= 10
    };

    function showFieldError(input, errorId) {
        input.classList.add('error');
        input.classList.remove('valid');
        const errEl = document.getElementById(errorId);
        if (errEl) errEl.classList.add('visible');
    }
    function hideFieldError(input, errorId) {
        input.classList.remove('error');
        const errEl = document.getElementById(errorId);
        if (errEl) errEl.classList.remove('visible');
    }
    function validateField(input, validatorType, errorId) {
        const val = input.value;
        if (!val.trim() && input.hasAttribute('required')) {
            showFieldError(input, errorId);
            return false;
        }
        if (val.trim() && !validators[validatorType](val)) {
            showFieldError(input, errorId);
            return false;
        }
        hideFieldError(input, errorId);
        input.classList.add('valid');
        return true;
    }

    // Добавляем span для ошибок в форму контактов
    const contactForm = document.getElementById('contactForm');
    if (contactForm) {
        const fields = [
            { id: 'contactName', errorId: 'contactNameError', validator: 'name', msg: 'Введите имя (минимум 2 символа)' },
            { id: 'contactEmail', errorId: 'contactEmailError', validator: 'email', msg: 'Введите корректный email' },
            { id: 'contactPhone', errorId: 'contactPhoneError', validator: 'phone', msg: 'Введите полный номер телефона' },
            { id: 'contactMessage', errorId: 'contactMessageError', validator: 'message', msg: 'Минимум 10 символов' }
        ];
        fields.forEach(f => {
            const input = document.getElementById(f.id);
            if (!input) return;
            // Создаём элемент ошибки, если его нет
            let errEl = document.getElementById(f.errorId);
            if (!errEl) {
                errEl = document.createElement('span');
                errEl.className = 'error-message';
                errEl.id = f.errorId;
                errEl.textContent = f.msg;
                input.parentNode.appendChild(errEl);
            }
            // Валидация при потере фокуса
            input.addEventListener('blur', () => validateField(input, f.validator, f.errorId));
            input.addEventListener('input', () => {
                if (input.classList.contains('error')) validateField(input, f.validator, f.errorId);
            });
        });

        // Отправка формы
        contactForm.addEventListener('submit', function(e) {
            e.preventDefault();
            let isValid = true;
            fields.forEach(f => {
                const input = document.getElementById(f.id);
                if (!validateField(input, f.validator, f.errorId)) isValid = false;
            });
            if (!isValid) {
                const firstError = contactForm.querySelector('.error');
                if (firstError) firstError.scrollIntoView({ behavior: 'smooth', block: 'center' });
                return;
            }
            // Успех: сброс и модалка
            contactForm.reset();
            // Сброс валидации
            fields.forEach(f => {
                const inp = document.getElementById(f.id);
                if (inp) { inp.classList.remove('error','valid'); hideFieldError(inp, f.errorId); }
            });
            const phoneInput = document.getElementById('contactPhone');
            if (phoneInput) phoneInput.value = ''; // сброс маски (пустое поле)
            openSuccessModal('Сообщение отправлено! ✨', 'Менеджер театра свяжется с вами в течение 2 часов в рабочие дни.');
        });
    }

    // ===== КОНСТРУКТОР ЗАПРОСА (без изменений) =====
    function updatePreview() {
        const type = document.getElementById('eventType');
        const date = document.getElementById('eventDate').value || '—';
        const audience = document.getElementById('audienceCount');
        const format = document.getElementById('eventFormat');
        const typeText = type.options[type.selectedIndex].text;
        const audienceText = audience.options[audience.selectedIndex].text;
        const formatText = format.options[format.selectedIndex].text;
        document.getElementById('previewContent').innerHTML = `
            <div class="preview-item"><div class="preview-label">Тип</div><div class="preview-value">${typeText}</div></div>
            <div class="preview-item"><div class="preview-label">Дата</div><div class="preview-value">${date}</div></div>
            <div class="preview-item"><div class="preview-label">Зрителей</div><div class="preview-value">${audienceText}</div></div>
            <div class="preview-item"><div class="preview-label">Формат</div><div class="preview-value">${formatText}</div></div>
        `;
    }
    document.getElementById('previewBtn')?.addEventListener('click', updatePreview);
    document.getElementById('resetBtn')?.addEventListener('click', () => {
        document.getElementById('requestForm').reset();
        document.querySelectorAll('.custom-select-btn').forEach(btn => {
            const wrapper = btn.closest('.custom-select-wrapper');
            const nativeSelect = wrapper?.querySelector('select');
            if (nativeSelect && nativeSelect.options.length > 0) {
                btn.textContent = nativeSelect.options[0].text;
            }
        });
        document.querySelectorAll('.custom-select-option').forEach(opt => opt.classList.remove('selected'));
        document.querySelectorAll('.custom-select-option:first-child').forEach(opt => opt.classList.add('selected'));
        updatePreview();
    });
    document.getElementById('sendRequestBtn')?.addEventListener('click', () => {
        openSuccessModal('Запрос отправлен!', 'Менеджер свяжется с вами для уточнения деталей.');
    });

    // ===== МАСКА ТЕЛЕФОНА (улучшенная) =====
    const phoneInput = document.getElementById('contactPhone');
    if (phoneInput) {
        phoneInput.addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            let formatted = '';
            if (value.length > 0) {
                formatted = '+7';
                if (value.length > 1) formatted += ' (' + value.slice(1, 4);
                if (value.length > 4) formatted += ') ' + value.slice(4, 7);
                if (value.length > 7) formatted += '-' + value.slice(7, 9);
                if (value.length > 9) formatted += '-' + value.slice(9, 11);
            }
            e.target.value = formatted;
        });
        phoneInput.addEventListener('focus', function() { if (!this.value) this.value = '+7 ('; });
        phoneInput.addEventListener('blur', function() { if (this.value === '+7 (' || this.value === '+7') this.value = ''; });
    }

    // ===== КАСТОМНЫЕ SELECT (без изменений) =====
    function initCustomSelects() {
        const selects = document.querySelectorAll('#eventType, #audienceCount, #eventFormat');
        selects.forEach(function(nativeSelect) {
            if (nativeSelect.closest('.custom-select-wrapper')) return;
            const wrapper = document.createElement('div'); wrapper.className = 'custom-select-wrapper';
            const btn = document.createElement('button'); btn.type = 'button'; btn.className = 'custom-select-btn';
            btn.textContent = nativeSelect.options[nativeSelect.selectedIndex].text;
            const dropdown = document.createElement('div'); dropdown.className = 'custom-select-dropdown';
            Array.from(nativeSelect.options).forEach(function(option, index) {
                const item = document.createElement('div');
                item.className = 'custom-select-option' + (index === nativeSelect.selectedIndex ? ' selected' : '');
                item.textContent = option.text; item.dataset.value = option.value;
                item.addEventListener('click', function(e) {
                    e.stopPropagation();
                    nativeSelect.value = this.dataset.value;
                    btn.textContent = this.textContent;
                    dropdown.querySelectorAll('.custom-select-option').forEach(el => el.classList.remove('selected'));
                    this.classList.add('selected');
                    dropdown.classList.remove('show'); btn.classList.remove('active');
                    nativeSelect.dispatchEvent(new Event('change', { bubbles: true }));
                    updatePreview();
                });
                dropdown.appendChild(item);
            });
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                document.querySelectorAll('.custom-select-dropdown').forEach(d => { d.classList.remove('show'); d.previousElementSibling?.classList.remove('active'); });
                dropdown.classList.add('show'); btn.classList.add('active');
            });
            const clone = nativeSelect.cloneNode(true); clone.style.display = 'none';
            wrapper.appendChild(clone); nativeSelect.style.display = 'none';
            wrapper.insertBefore(btn, clone); wrapper.insertBefore(dropdown, clone);
            nativeSelect.parentNode.insertBefore(wrapper, nativeSelect);
            nativeSelect.parentNode.removeChild(nativeSelect);
        });
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.custom-select-wrapper')) {
                document.querySelectorAll('.custom-select-dropdown').forEach(d => { d.classList.remove('show'); d.previousElementSibling?.classList.remove('active'); });
            }
        });
    }

    // ===== ДАТА С КАЛЕНДАРЕМ (без изменений) =====
    function initDateField() { /* ... код инициализации календаря из исходного скрипта ... */ }

    // ===== ИНИЦИАЛИЗАЦИЯ =====
    document.addEventListener('DOMContentLoaded', () => {
        updatePreview();
        initCustomSelects();
        initDateField();
    });
})();
</script>
</body>
</html>
