<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Театр клоунады «Микос» | Афиша</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="SVG/logo-2.svg" sizes="any">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    
    <!-- Подключение Яндекс.Карт -->
    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU" type="text/javascript"></script>
    
    <style>
        /* Стили для карты гастролей */
        .tour-map-section {
            margin: 60px 0;
            padding: 40px 24px;
            background: linear-gradient(180deg, #F8F9FA 0%, #FFFFFF 100%);
            border-radius: 24px;
            border: 1px solid #E9ECEF;
        }
        
        .tour-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .tour-title {
            font-family: 'Unbounded', sans-serif;
            font-weight: 700;
            font-size: 24px;
            color: #1A1718;
            margin: 0;
        }
        
        .tour-all-link {
            font-family: 'Nunito Sans', sans-serif;
            font-weight: 600;
            color: #4A6294;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }
        .tour-all-link:hover { color: #2A3D5E; }
        
        .tour-map-container {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 24px;
            align-items: start;
        }
        
        #yandexMap {
            width: 100%;
            height: 500px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(42,61,94,0.08);
        }
        
        .tour-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 8px;
        }
        
        .tour-list::-webkit-scrollbar {
            width: 6px;
        }
        
        .tour-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }
        
        .tour-list::-webkit-scrollbar-thumb {
            background: #4A6294;
            border-radius: 3px;
        }
        
        .tour-item {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #E9ECEF;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        
        .tour-item:hover {
            border-color: #4A6294;
            box-shadow: 0 4px 16px rgba(42,61,94,0.08);
            transform: translateY(-2px);
        }
        
        .tour-item.active {
            border-color: #E8454D;
            background: #FFF5F5;
        }
        
        .tour-city {
            font-family: 'Unbounded', sans-serif;
            font-weight: 600;
            color: #1A1718;
            margin-bottom: 4px;
            font-size: 15px;
        }
        
        .tour-dates {
            font-size: 14px;
            color: #5A5556;
            margin-bottom: 6px;
        }
        
        .tour-venue {
            font-size: 13px;
            color: #3D393A;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .tour-status {
            display: inline-block;
            margin-top: 10px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .tour-status.available { background: #E8F5E9; color: #2E7D32; }
        .tour-status.soon { background: #FFF3E0; color: #E65100; }
        .tour-status.sold { background: #F5F5F5; color: #616161; }
        
        .tour-all-link-bottom {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #E9ECEF;
        }
        
        /* Адаптивность */
        @media (max-width: 968px) {
            .tour-map-container {
                grid-template-columns: 1fr;
            }
            
            #yandexMap {
                height: 400px;
            }
            
            .tour-list {
                max-height: 300px;
                flex-direction: row;
                overflow-x: auto;
                overflow-y: hidden;
                padding-right: 0;
                padding-bottom: 8px;
            }
            
            .tour-item {
                min-width: 260px;
            }
        }
        
        @media (max-width: 480px) {
            .tour-map-section {
                padding: 24px 16px;
                margin: 40px 0;
            }
            
            #yandexMap {
                height: 300px;
            }
            
            .tour-list {
                flex-direction: column;
                max-height: none;
                overflow-y: auto;
            }
            
            .tour-item {
                min-width: auto;
            }
        }
        
        /* Стили для балуна Яндекс.Карт */
        .ymaps-balloon {
            font-family: 'Nunito Sans', sans-serif !important;
        }
        
        .balloon-content b {
            font-family: 'Unbounded', sans-serif;
            color: #1A1718;
            font-size: 16px;
            display: block;
            margin-bottom: 6px;
        }
        
        .balloon-content .date {
            color: #5A5556;
            font-size: 14px;
            display: block;
            margin: 4px 0;
        }
        
        .balloon-content .venue {
            color: #3D393A;
            font-size: 13px;
            display: block;
            margin: 6px 0;
        }
        
        .balloon-content .status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 6px;
        }
    </style>
</head>
<body>

                <div class="filter-chip-date">

        <!-- Карта гастролей с Яндекс.Картой -->

            <div class="tour-header">

    <!-- Модальное окно "Все гастроли" -->
    <div class="modal-overlay" id="tourModalOverlay">
        <div class="DivModalContent">

                </div>
                <div class="P">

                <span>Билеты поступают в продажу за 30 дней до показа</span>

            <img class="ModalBackgroundImage" src="https://placehold.co/453x594" alt="Decor" />
        </div>
    </div>

    <!-- FOOTER -->
    <div id="site-footer"></div>
</div>

<!-- СКРИПТЫ -->
<script src="js/components-loader.js"></script>
<script src="js/header-scripts.js"></script>
<script src="js/common.js"></script>
<script src="js/slider-scripts.js"></script>

<script>
// =============================================
// ДАННЫЕ
// =============================================
const events = [
    { id: 1, name: 'Лишь бы не было детей', date: '15 апреля 19:00', monthKey: 'апрель', year: 2026, desc: 'История сосуществования очень разных людей. Клоунада о выживании.', age: '18+', time: '90 минут', tickets: true, venue: 'Основная сцена', img: 'images/content/performances/15.jpg', price: '1 500 ₽' },
    { id: 2, name: 'Богатыри', date: '22 апреля 18:00', monthKey: 'апрель', year: 2026, desc: 'Былины в современном прочтении. Эпическая комедия для всей семьи.', age: '12+', time: '100 минут', tickets: true, venue: 'Основная сцена', img: 'images/content/performances/3.jpg', price: '1 400 ₽' },
    { id: 3, name: 'Ожидание', date: '5 мая 20:00', monthKey: 'май', year: 2026, desc: 'Трогательная история о времени, надежде и встречах.', age: '16+', time: '80 минут', tickets: true, venue: 'Малая сцена', img: 'images/content/performances/9.jpg', price: '1 200 ₽' },
    { id: 4, name: 'Кабаре-Шапито', date: '12 мая 19:00', monthKey: 'май', year: 2026, desc: 'Феерия клоунады и музыки. Кабаре с цирковыми номерами.', age: '18+', time: '110 минут', tickets: true, venue: 'Основная сцена', img: 'images/content/performances/10.jpg', price: '1 800 ₽' },
    { id: 5, name: 'Авиаторы', date: '20 октября 19:00', monthKey: 'октябрь', year: 2026, desc: 'О мечтах, полетах и свободе. Вдохновляющая драма.', age: '16+', time: '95 минут', tickets: true, venue: 'Основная сцена', img: 'images/content/performances/6.jpg', price: '1 600 ₽' }
];

const tourData = [
    { city: 'Санкт-Петербург', dates: '15–18 ноября 2025', venue: 'БДТ им. Товстоногова, Основная сцена', status: 'Билеты', statusClass: 'available', coords: [59.9343, 30.3351] },
    { city: 'Казань', dates: '22–24 ноября 2025', venue: 'Театр им. Камала, Большой зал', status: 'Билеты', statusClass: 'available', coords: [55.7887, 49.1221] },
    { city: 'Екатеринбург', dates: '5–7 декабря 2025', venue: 'Театр драмы, Основная сцена', status: 'Билеты', statusClass: 'available', coords: [56.8389, 60.6057] },
    { city: 'Новосибирск', dates: '15–18 декабря 2025', venue: 'Театр «Глобус», Большой зал', status: 'Все продано', statusClass: 'sold', coords: [55.0084, 82.9357] },
    { city: 'Нижний Новгород', dates: '10–12 января 2026', venue: 'Театр драмы им. Горького', status: 'Билеты', statusClass: 'available', coords: [56.2965, 43.9361] },
    { city: 'Самара', dates: '18–20 января 2026', venue: 'Самарский театр драмы', status: 'Билеты', statusClass: 'available', coords: [53.1959, 50.1002] },
    { city: 'Тверь', dates: '25–27 января 2026', venue: 'Тверской театр драмы', status: 'Cкоро', statusClass: 'soon', coords: [56.8584, 35.9006] },
    { city: 'Краснодар', dates: '1–3 февраля 2026', venue: 'Краснодарский театр драмы', status: 'Cкоро', statusClass: 'soon', coords: [45.0355, 38.9753] },
    { city: 'Воронеж', dates: '8–10 февраля 2026', venue: 'Воронежский театр драмы', status: 'Билеты', statusClass: 'available', coords: [51.6720, 39.1843] },
    { city: 'Пермь', dates: '14–16 февраля 2026', venue: 'Театр-Театр', status: 'Cкоро', statusClass: 'soon', coords: [58.0105, 56.2502] },
    { city: 'Челябинск', dates: '21–23 февраля 2026', venue: 'Челябинский театр драмы', status: 'Cкоро', statusClass: 'soon', coords: [55.1644, 61.4368] },
    { city: 'Омск', dates: '1–3 марта 2026', venue: 'Омский театр драмы', status: 'Cкоро', statusClass: 'soon', coords: [54.9885, 73.3242] }
];

// Глобальная переменная для карты
let myMap;
let placemarks = [];

// =============================================
// ИНИЦИАЛИЗАЦИЯ ЯНДЕКС.КАРТЫ
// =============================================
function initYandexMap() {
    if (typeof ymaps === 'undefined') {
        console.error('Yandex Maps API not loaded');
        return;
    }
    
    ymaps.ready(function() {
        // Создание карты
        myMap = new ymaps.Map("yandexMap", {
            center: [60, 80], // Центр России
            zoom: 4,
            controls: ['zoomControl', 'geolocationControl']
        });
        
        // Добавление меток для каждого города
        tourData.forEach((item, index) => {
            // Определение цвета метки в зависимости от статуса
            let preset = 'islands#redCircleIcon';
            if (item.statusClass === 'sold') {
                preset = 'islands#grayCircleIcon';
            } else if (item.statusClass === 'soon') {
                preset = 'islands#orangeCircleIcon';
            }
            
            // Создание метки
            const placemark = new ymaps.Placemark(item.coords, {
                hintContent: item.city,
                balloonContent: `
                    <div class="balloon-content">
                        <b>${item.city}</b>
                        <span class="date">📅 ${item.dates}</span>
                        <span class="venue">🎭 ${item.venue}</span>
                        <span class="status ${item.statusClass}">${item.status}</span>
                    </div>
                `
            }, {
                preset: preset,
                iconColor: item.statusClass === 'sold' ? '#6C757D' : (item.statusClass === 'soon' ? '#F4A261' : '#E8454D')
            });
            
            myMap.geoObjects.add(placemark);
            placemarks.push(placemark);
            
            // Добавление обработчика клика
            placemark.events.add('click', function() {
                highlightTourItem(index);
            });
        });
        
        // Отображение всех меток в границах карты
        myMap.setBounds(myMap.geoObjects.getBounds(), {
            checkZoomRange: true,
            zoomMargin: 50
        });
        
        // Генерация списка городов
        renderTourList();
    });
}

// =============================================
// ОТРИСОВКА СПИСКА ГОРОДОВ
// =============================================
function renderTourList() {
    const tourList = document.getElementById('tourList');
    if (!tourList) return;
    
    tourList.innerHTML = '';
    
    tourData.forEach((item, index) => {
        const tourItem = document.createElement('div');
        tourItem.className = 'tour-item';
        tourItem.dataset.index = index;
        tourItem.innerHTML = `
            <div class="tour-city">${item.city}</div>
            <div class="tour-dates"><span>${item.dates}</span></div>
            <div class="tour-venue"><i class="fas fa-map-marker-alt"></i> ${item.venue}</div>
            <div class="tour-status ${item.statusClass}">${item.status}</div>
        `;
        
        // Обработчик клика
        tourItem.addEventListener('click', function() {
            highlightTourItem(index);
        });
        
        tourList.appendChild(tourItem);
    });
}

// =============================================
// ПОДСВЕТКА ЭЛЕМЕНТА СПИСКА И ЦЕНТРИРОВАНИЕ НА МЕТКЕ
// =============================================
function highlightTourItem(index) {
    // Убираем подсветку со всех элементов
    document.querySelectorAll('.tour-item').forEach(item => {
        item.classList.remove('active');
    });
    
    // Подсвечиваем текущий
    const currentItem = document.querySelector(`.tour-item[data-index="${index}"]`);
    if (currentItem) {
        currentItem.classList.add('active');
        currentItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    
    // Центрируем карту на метке
    if (placemarks[index]) {
        myMap.setCenter(placemarks[index].geometry.getCoordinates(), 10);
        placemarks[index].balloon.open();
    }
}

// =============================================
// DOM ЭЛЕМЕНТЫ И ПЕРЕМЕННЫЕ
// =============================================
const grid = document.getElementById('eventsGrid');
const showMoreBtn = document.getElementById('showMoreEventsBtn');
const monthSelect = document.getElementById('monthSelect');
const allChip = document.querySelector('[data-filter="all"]');

let visibleCount = 6;
let currentFilter = 'all';

// =============================================
// ИНИЦИАЛИЗАЦИЯ СЕЛЕКТА МЕСЯЦЕВ
// =============================================
function populateMonthSelect() {
    const months = ['январь', 'февраль', 'март', 'апрель', 'май', 'июнь', 'июль', 'август', 'сентябрь', 'октябрь', 'ноябрь', 'декабрь'];
    const today = new Date();
    const currentYear = today.getFullYear();
    const currentMonthIndex = today.getMonth();
    
    let optionsHtml = '';
    for (let i = 0; i < 12; i++) {
        const monthIdx = (currentMonthIndex + i) % 12;
        const year = currentYear + Math.floor((currentMonthIndex + i) / 12);
        const monthName = months[monthIdx];
        const displayText = monthName.charAt(0).toUpperCase() + monthName.slice(1) + ' ' + year;
        const value = `${monthName}-${year}`;
        const selected = (i === 0) ? 'selected' : '';
        optionsHtml += `<option value="${value}" ${selected}>${displayText}</option>`;
    }
    monthSelect.innerHTML = optionsHtml;
}

// =============================================
// ФИЛЬТРАЦИЯ СОБЫТИЙ
// =============================================
function getFilteredEvents() {
    if (currentFilter === 'all') return events;
    const [month, year] = currentFilter.split('-');
    return events.filter(ev => ev.monthKey === month && ev.year === parseInt(year));
}

// =============================================
// ОТРИСОВКА КАРТОЧЕК
// =============================================
function renderEvents() {
    const filtered = getFilteredEvents();
    const displayEvents = filtered.slice(0, visibleCount);
    
    grid.innerHTML = '';
    
    displayEvents.forEach(e => {
        const card = document.createElement('div');
        card.className = 'performance-card-afisha';
        card.innerHTML = `
            <img class="performance-img-afisha" src="${e.img}" alt="${e.name}">
            <div class="performance-content-afisha">
                <div class="performance-tags-afisha">
                    <span class="tag-afisha tag-age">${e.age}</span>
                    <span class="tag-afisha tag-time">${e.time}</span>
                    <span class="tag-afisha tag-tickets">${e.tickets ? 'Есть билеты' : 'Билетов нет'}</span>
                </div>
                <h3 class="performance-name-afisha">${e.name}</h3>
                <div class="performance-date-afisha">${e.date}</div>
                <p class="performance-desc-afisha">${e.desc}</p>
                <div class="event-venue-afisha"><i class="fas fa-map-marker-alt"></i><span>${e.venue}</span></div>
                <div class="performance-btns-afisha">
                    <button class="btn-details-afisha" data-id="${e.id}">Подробнее</button>
                    <button class="btn-buy-afisha" data-id="${e.id}">Купить билет</button>
                </div>
            </div>
        `;
        grid.appendChild(card);
    });

    // Обработчики кнопок
    document.querySelectorAll('.btn-details-afisha').forEach(btn => {
        btn.addEventListener('click', () => window.location.href = `performance.html?id=${btn.dataset.id}`);
    });
    
    document.querySelectorAll('.btn-buy-afisha').forEach(btn => {
        btn.addEventListener('click', () => {
            const id = parseInt(btn.dataset.id);
            const selectedEvent = events.find(e => e.id === id);
            if (!selectedEvent) return;
            
            const orderInfo = {
                title: selectedEvent.name,
                dateTime: selectedEvent.date,
                hall: selectedEvent.venue,
                price: selectedEvent.price,
                poster: selectedEvent.img
            };
            
            localStorage.setItem('selectedPerformance', JSON.stringify(orderInfo));
            window.location.href = 'checkout.html';
        });
    });

    showMoreBtn.style.display = filtered.length > visibleCount ? 'block' : 'none';
    updateFilterVisuals();
}

// =============================================
// ОБНОВЛЕНИЕ ВИЗУАЛА ФИЛЬТРОВ
// =============================================
function updateFilterVisuals() {
    allChip.classList.toggle('active', currentFilter === 'all');
    monthSelect.classList.toggle('active-filter', currentFilter !== 'all');
    
    if (currentFilter !== 'all') {
        monthSelect.value = currentFilter;
    } else {
        monthSelect.selectedIndex = 0;
    }
    
    const customTrigger = document.querySelector('.custom-month-trigger');
    if (customTrigger) {
        customTrigger.classList.toggle('active', currentFilter !== 'all');
    }
}

// =============================================
// КАСТОМНЫЙ ВЫПАДАЮЩИЙ СПИСОК
// =============================================
function initCustomMonthSelect() {
    const originalSelect = document.getElementById('monthSelect');
    if (!originalSelect) return;
    if (document.querySelector('.custom-month-select')) return;
    
    originalSelect.style.display = 'none';
    
    const wrapper = document.createElement('div');
    wrapper.className = 'custom-month-select';
    
    const trigger = document.createElement('div');
    trigger.className = 'custom-month-trigger';
    
    const getSelectedText = () => {
        const selected = originalSelect.options[originalSelect.selectedIndex];
        return selected ? selected.text : 'Апрель 2026';
    };
    
    trigger.innerHTML = `${getSelectedText()} <span class="arrow-icon">▾</span>`;
    
    if (originalSelect.classList.contains('active-filter')) {
        trigger.classList.add('active');
    }
    
    const dropdown = document.createElement('div');
    dropdown.className = 'custom-month-dropdown';
    
    function renderOptions() {
        dropdown.innerHTML = '';
        Array.from(originalSelect.options).forEach((option) => {
            const optionEl = document.createElement('div');
            optionEl.className = 'custom-month-option';
            if (option.selected) optionEl.classList.add('selected');
            optionEl.textContent = option.text;
            optionEl.dataset.value = option.value;
            
            const selectHandler = (e) => {
                e.stopPropagation();
                e.preventDefault();
                
                originalSelect.value = optionEl.dataset.value;
                trigger.innerHTML = `${optionEl.textContent} <span class="arrow-icon">▾</span>`;
                
                const isFirstOption = originalSelect.selectedIndex === 0;
                if (!isFirstOption) {
                    originalSelect.classList.add('active-filter');
                    trigger.classList.add('active');
                } else {
                    originalSelect.classList.remove('active-filter');
                    trigger.classList.remove('active');
                }
                
                dropdown.querySelectorAll('.custom-month-option').forEach(opt => opt.classList.remove('selected'));
                optionEl.classList.add('selected');
                
                wrapper.classList.remove('open');
                originalSelect.dispatchEvent(new Event('change', { bubbles: true }));
            };
            
            optionEl.addEventListener('click', selectHandler);
            optionEl.addEventListener('touchstart', selectHandler, { passive: false });
            
            dropdown.appendChild(optionEl);
        });
    }
    
    renderOptions();
    
    const toggleHandler = (e) => {
        e.stopPropagation();
        e.preventDefault();
        
        document.querySelectorAll('.custom-month-select.open').forEach(el => {
            if (el !== wrapper) el.classList.remove('open');
        });
        
        wrapper.classList.toggle('open');
    };
    
    trigger.addEventListener('click', toggleHandler);
    trigger.addEventListener('touchstart', toggleHandler, { passive: false });
    
    document.addEventListener('click', (e) => {
        if (!wrapper.contains(e.target)) wrapper.classList.remove('open');
    });
    
    document.addEventListener('touchstart', (e) => {
        if (!wrapper.contains(e.target)) wrapper.classList.remove('open');
    }, { passive: true });
    
    dropdown.addEventListener('click', (e) => e.stopPropagation());
    dropdown.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: false });
    
    wrapper.appendChild(trigger);
    wrapper.appendChild(dropdown);
    originalSelect.parentNode.insertBefore(wrapper, originalSelect);
    
    if (allChip) {
        const resetHandler = () => {
            originalSelect.selectedIndex = 0;
            originalSelect.classList.remove('active-filter');
            trigger.classList.remove('active');
            trigger.innerHTML = `${originalSelect.options[0].text} <span class="arrow-icon">▾</span>`;
            
            dropdown.querySelectorAll('.custom-month-option').forEach(opt => {
                opt.classList.toggle('selected', opt.dataset.value === originalSelect.value);
            });
            wrapper.classList.remove('open');
        };
        
        allChip.addEventListener('click', resetHandler);
        allChip.addEventListener('touchstart', resetHandler, { passive: true });
    }
    
    const observer = new MutationObserver(() => {
        const newText = getSelectedText();
        trigger.innerHTML = `${newText} <span class="arrow-icon">▾</span>`;
        trigger.classList.toggle('active', originalSelect.classList.contains('active-filter'));
        
        const selectedValue = originalSelect.value;
        dropdown.querySelectorAll('.custom-month-option').forEach(opt => {
            opt.classList.toggle('selected', opt.dataset.value === selectedValue);
        });
    });
    
    observer.observe(originalSelect, { attributes: true, attributeFilter: ['class', 'value'] });
    
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && wrapper.classList.contains('open')) {
            wrapper.classList.remove('open');
        }
    });
    
    document.addEventListener('touchstart', (e) => {
        if (wrapper.classList.contains('open')) {
            if (!wrapper.contains(e.target)) {
                wrapper.classList.remove('open');
            }
        }
    }, { passive: true });
    
    document.addEventListener('click', (e) => {
        if (wrapper.classList.contains('open')) {
            if (!wrapper.contains(e.target)) {
                wrapper.classList.remove('open');
            }
        }
    });
    
    window.addEventListener('popstate', () => {
        if (wrapper.classList.contains('open')) {
            wrapper.classList.remove('open');
        }
    });
    
    dropdown.addEventListener('touchmove', (e) => {
        e.stopPropagation();
    }, { passive: false });
}

// =============================================
// МОДАЛЬНОЕ ОКНО ГАСТРОЛЕЙ
// =============================================
function initTourModal() {
    const modalOverlay = document.getElementById('tourModalOverlay');
    const closeModalBtn = document.getElementById('closeTourModal');
    const openModalLink = document.getElementById('openAllToursModal');
    const modalListContainer = document.getElementById('modalTourListContainer');
    
    if (!modalOverlay) return;
    
    function renderTourModal() {
        let html = '';
        tourData.forEach(item => {
            const statusClass = item.statusClass ? ` ${item.statusClass}` : '';
            html += `
                <div class="DivModalTourItem">
                    <div class="SpanModalTourCity"><div>${item.city}</div></div>
                    <div class="DivModalTourDates">
                        <div class="Strong"><div>${item.dates}</div></div>
                        <div class="SpanModalTourVenue">
                            <i class="fas fa-map-marker-alt"></i>
                            <span>${item.venue}</span>
                        </div>
                    </div>
                    <div class="SpanTourStatus${statusClass}">${item.status}</div>
                </div>
            `;
        });
        modalListContainer.innerHTML = html;
    }
    
    renderTourModal();
    
    const openModal = (e) => { e?.preventDefault(); modalOverlay.classList.add('active'); document.body.style.overflow = 'hidden'; };
    const closeModal = () => { modalOverlay.classList.remove('active'); document.body.style.overflow = ''; };
    
    openModalLink?.addEventListener('click', openModal);
    openModalLink?.addEventListener('touchstart', openModal, { passive: false });
    closeModalBtn?.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });
}

// =============================================
// ХЕДЕР И БУРГЕР
// =============================================
function initHeader() {
    const dotsIcon = document.getElementById('dotsIcon');
    const closeIcon = document.getElementById('closeIcon');
    const extraRow = document.getElementById('extraMenuRow');
    
    if (dotsIcon && closeIcon && extraRow) {
        dotsIcon.addEventListener('click', () => {
            extraRow.classList.add('open');
            dotsIcon.style.display = 'none';
            closeIcon.style.display = 'inline-flex';
        });
        
        closeIcon.addEventListener('click', () => {
            extraRow.classList.remove('open');
            dotsIcon.style.display = 'inline-flex';
            closeIcon.style.display = 'none';
        });
    }
    
    const burgerIcon = document.getElementById('burgerIcon');
    const mobileNav = document.getElementById('mobileNav');
    const overlay = document.getElementById('overlay');
    const closeMobileBtn = document.getElementById('closeMobileMenu');
    
    if (burgerIcon && mobileNav && overlay) {
        const openMobile = () => {
            mobileNav.classList.add('open');
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        };
        
        const closeMobile = () => {
            mobileNav.classList.remove('open');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        };
        
        burgerIcon.addEventListener('click', openMobile);
        closeMobileBtn?.addEventListener('click', closeMobile);
        overlay.addEventListener('click', closeMobile);
    }
    
    document.getElementById('subscribeBtn')?.addEventListener('click', () => {
        const chk = document.getElementById('consentCheckbox');
        const err = document.getElementById('consentError');
        if (!chk?.checked) {
            if (err) { err.style.display = 'block'; setTimeout(() => err.style.display = 'none', 2500); }
        } else {
            alert('Спасибо за подписку!');
            document.getElementById('subscribeEmail').value = '';
            chk.checked = false;
        }
    });
    
    document.querySelectorAll('.footer-btn-primary, .buy-ticket-btn').forEach(btn => {
        btn.addEventListener('click', () => alert('Билеты скоро в продаже'));
    });
    
    document.querySelector('.footer-btn-secondary')?.addEventListener('click', () => {
        alert('Заказ шоу: свяжитесь с нами по телефону');
    });
}

// =============================================
// ОБРАБОТЧИКИ ФИЛЬТРОВ
// =============================================
function initFilters() {
    allChip.addEventListener('click', () => {
        currentFilter = 'all';
        visibleCount = 6;
        renderEvents();
    });
    
    monthSelect.addEventListener('change', (e) => {
        currentFilter = e.target.value;
        visibleCount = 6;
        renderEvents();
    });
    
    showMoreBtn.addEventListener('click', () => {
        const filtered = getFilteredEvents();
        if (visibleCount < filtered.length) {
            visibleCount = Math.min(visibleCount + 3, filtered.length);
            renderEvents();
        }
    });
}

// =============================================
// ЗАПУСК ВСЕГО
// =============================================
(function init() {
    populateMonthSelect();
    initFilters();
    initTourModal();
    initHeader();
    renderEvents();
    
    setTimeout(initCustomMonthSelect, 50);
    
    // Инициализация Яндекс.Карты после загрузки DOM
    setTimeout(initYandexMap, 100);
})();
</script>
