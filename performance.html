<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Театр клоунады «Микос» | Спектакль</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>

    </style>
</head>
<body>
<div class="shop-container">
    <!-- HEADER (идентичен) -->
    <div id="site-header"></div>
    <div class="mobile-nav" id="mobileNav"><div class="close-mobile-menu" id="closeMobileMenu">✕</div><ul><li><a href="#">Главная</a></li><li><a href="#">Афиша</a></li><li><a href="#">Заказчикам</a></li><li><a href="#">Брендбук</a></li><li><a href="#">Спектакли</a></li><li><a href="#">Команда</a></li><li><a href="#">О театре</a></li><li><a href="#">Магазин</a></li><li><a href="#">Контакты</a></li></ul></div>
    <div class="overlay" id="overlay"></div>

    <!-- Динамический контент спектакля -->
    <div class="performance-page" id="performanceDetailsContainer">
        <!-- JS заполнит -->
    </div>

    <!-- FOOTER -->
    <div id="site-footer"></div>
</div>
<script src="js/components-loader.js"></script>
<script src="js/header-scripts.js"></script>
<script src="js/common.js"></script>
<script>
    (function(){
        // ---------- БАЗА ДАННЫХ 5 СПЕКТАКЛЕЙ ----------
        const performancesData = {
            1: {
                title: 'Лишь бы не было детей',
                age: '18+', duration: '90 минут', premiere: '2019 год',
                desc: 'История сосуществования в одном пространстве нескольких людей — очень разных. Они пытаются выжить, сохранить своё «я», не сойти с ума. И всё это — через призму клоунады, самого человечного из искусств.',
                directorNote: '«Это спектакль о нас. О том, как мы пытаемся быть вместе, но оставаться собой. О страхах, мечтах и несбывшихся надеждах».',
                review: '«Лишь бы не было детей — это не просто спектакль, это опыт проживания чужих жизней. Театр снова доказывает, что клоунада — про человеческую душу.»',
                reviewAuthor: 'Театральный обозреватель «Коммерсантъ»',
                price: '1 500 ₽', poster: 'https://placehold.co/540x720/2a3f5e/white?text=Лишь+бы+не+было+детей',
                schedule: [{date:'Сегодня, 31 марта', time:'19:00', seats:'осталось 8 мест', badge:'seats-red'},{date:'Завтра, 1 апреля', time:'19:00', seats:'42 места', badge:'seats-blue'},{date:'5 апреля, суббота', time:'18:00', seats:'осталось 5 мест', badge:'seats-red'}],
                cast: [{initials:'СД', name:'Сергей Давыдов', role:'Режиссер'},{initials:'МИ', name:'Мария Иванова', role:'Актриса'},{initials:'АП', name:'Алексей Петров', role:'Актер'},{initials:'ЕС', name:'Елена Смирнова', role:'Актриса'}],
                technical: { stage:'Основная сцена', duration:'90 минут', premiere:'2019', genre:'Клоунада, драма', age:'18+', director:'Сергей «Паганель» Давыдов', artist:'Анна Крылова', composer:'Дмитрий Орлов' }
            },
            2: {
                title: 'Богатыри', age:'12+', duration:'100 минут', premiere:'2021 год',
                desc: 'Былины в современном прочтении. Сила, честь и юмор в одном флаконе. Эпическая комедия для всей семьи.',
                directorNote: '«Мы играем с архетипами: Илья, Добрыня, Алёша — они среди нас. Им тоже знакомы офисные битвы и пробки, но в душе они богатыри».',
                review: '«Задорно, смешно и очень по-русски. Отличный спектакль для семейного просмотра.»', reviewAuthor: 'Афиша Daily',
                price: '1 400 ₽', poster: 'https://placehold.co/540x720/4a6294/white?text=Богатыри',
                schedule: [{date:'2 апреля', time:'18:00', seats:'32 места', badge:'seats-blue'},{date:'6 апреля', time:'15:00', seats:'осталось 12 мест', badge:'seats-red'}],
                cast: [{initials:'ИМ', name:'Игорь Маслов', role:'Илья'},{initials:'ДС', name:'Дмитрий Светлов', role:'Добрыня'},{initials:'АК', name:'Алексей Круглов', role:'Алёша'}],
                technical: { stage:'Основная сцена', duration:'100 минут', premiere:'2021', genre:'Комедия, фолк-фэнтези', age:'12+', director:'Сергей Давыдов' }
            },
            3: {
                title: 'Ожидание', age:'16+', duration:'80 минут', premiere:'2022 год',
                desc: 'Трогательная история о времени, надежде и встречах. Минимализм и глубина.',
                directorNote: '«Ожидание — самое деятельное состояние. Мы ждём, и в этом вся жизнь».',
                review: '«Камерный шедевр. Актёры работают на разрыв.»', reviewAuthor: 'Театрал', price: '1 200 ₽', poster: 'https://placehold.co/540x720/3a5078/white?text=Ожидание',
                schedule: [{date:'3 апреля', time:'20:00', seats:'18 мест', badge:'seats-blue'}],
                cast: [{initials:'ЕВ', name:'Елена Ветрова', role:'Она'},{initials:'АН', name:'Андрей Новиков', role:'Он'}],
                technical: { stage:'Малая сцена', duration:'80 минут', premiere:'2022', genre:'Драма', age:'16+' }
            },
            4: {
                title: 'Кабаре-Шапито', age:'18+', duration:'110 минут', premiere:'2020 год',
                desc: 'Феерия клоунады и музыки. Яркое кабаре с цирковыми номерами и живым оркестром.',
                review: '«Праздник, который всегда с тобой. Зрители танцуют в проходах!»', reviewAuthor: 'TimeOut', price: '1 800 ₽', poster: 'https://placehold.co/540x720/2e4c7a/white?text=Кабаре-Шапито',
                schedule: [{date:'4 апреля', time:'19:00', seats:'осталось 3 места', badge:'seats-red'}],
                cast: [{initials:'Труппа', name:'Вся труппа театра', role:'Артисты'}],
                technical: { stage:'Основная сцена', duration:'110 минут', premiere:'2020', genre:'Кабаре, клоунада', age:'18+' }
            },
            5: {
                title: 'Авиаторы', age:'16+', duration:'95 минут', premiere:'2023 год',
                desc: 'О мечтах, полетах и свободе. История о людях, которые стремятся в небо, оставляя земные заботы.',
                review: '«Вдохновляющая постановка. Хочется расправить крылья.»', reviewAuthor: 'Культура.РФ', price: '1 600 ₽', poster: 'https://placehold.co/540x720/1f3a5f/white?text=Авиаторы',
                schedule: [{date:'7 апреля', time:'19:00', seats:'25 мест', badge:'seats-blue'}],
                cast: [{initials:'ЛК', name:'Лев Котов', role:'Пилот'},{initials:'ОС', name:'Ольга Соколова', role:'Штурман'}],
                technical: { stage:'Основная сцена', duration:'95 минут', premiere:'2023', genre:'Драма, приключения', age:'16+' }
            }
        };

        // Получить ID из URL
        const params = new URLSearchParams(window.location.search);
        let perfId = parseInt(params.get('id')) || 1; // по умолчанию 1
        if (!performancesData[perfId]) perfId = 1;
        const data = performancesData[perfId];

        // Заполняем контейнер
        const container = document.getElementById('performanceDetailsContainer');
        function renderDetails() {
            const tech = data.technical || {};
            // Сборка расписания
            let scheduleHtml = '';
            data.schedule?.forEach(s => {
                scheduleHtml += `<div class="schedule-item"><div><div class="schedule-date">${s.date}</div><div class="schedule-time">${s.time}</div></div><div><span class="seats-badge ${s.badge}">${s.seats}</span></div><button class="schedule-buy">Купить билеты</button></div>`;
            });
            // Актёры
            let castHtml = '';
            data.cast?.forEach(c => { castHtml += `<div class="cast-card"><div class="cast-avatar">${c.initials}</div><div><div class="cast-name">${c.name}</div><div class="cast-role">${c.role}</div></div></div>`; });
            
            const html = `
                <div class="breadcrumbs"><a href="index.html">Главная</a> <span>/</span> <a href="performances.html">Спектакли</a> <span>/</span> <span>${data.title}</span></div>
                <div class="performance-hero">
                    <div class="performance-poster"><img src="${data.poster}" alt="${data.title}"></div>
                    <div class="performance-info">
                        <h1 class="performance-title">${data.title}</h1>
                        <div class="performance-meta">
                            <div class="meta-item"><span class="meta-label">Возраст</span><span class="meta-value">${data.age}</span></div>
                            <div class="meta-item"><span class="meta-label">Длительность</span><span class="meta-value">${data.duration}</span></div>
                            <div class="meta-item"><span class="meta-label">Премьера</span><span class="meta-value">${data.premiere}</span></div>
                        </div>
                        <div class="performance-description"><h3>О спектакле</h3><p>${data.desc}</p><h3>Режиссёр о спектакле</h3><p>${data.directorNote || '«Этот спектакль — наша попытка поговорить со зрителем на важные темы языком клоунады».'}</p></div>
                        <div class="review-block"><div class="review-text">«${data.review || 'Яркая, запоминающаяся работа театра.»'}»</div><div class="review-author">— ${data.reviewAuthor || 'Пресса'}</div></div>
                        <div class="performance-price">от ${data.price}</div>
                        <button class="buy-ticket-main">Купить билет</button>
                    </div>
                </div>
                <div class="schedule-section"><div class="schedule-header"><h3 class="schedule-title">Расписание сеансов</h3></div><div class="schedule-list">${scheduleHtml}</div></div>
                <div class="cast-section"><h3 class="cast-title">Актёрский состав</h3><div class="cast-grid">${castHtml}</div></div>
                <div class="technical-section"><h3 class="technical-title">Техническая информация</h3><div class="technical-grid">
                    <div class="technical-item"><span class="technical-label">Сцена:</span><span class="technical-value">${tech.stage || 'Основная сцена'}</span></div>
                    <div class="technical-item"><span class="technical-label">Продолжительность:</span><span class="technical-value">${tech.duration || data.duration}</span></div>
                    <div class="technical-item"><span class="technical-label">Премьера:</span><span class="technical-value">${tech.premiere || data.premiere}</span></div>
                    <div class="technical-item"><span class="technical-label">Жанр:</span><span class="technical-value">${tech.genre || 'Клоунада'}</span></div>
                    <div class="technical-item"><span class="technical-label">Возраст:</span><span class="technical-value">${tech.age || data.age}</span></div>
                    <div class="technical-item"><span class="technical-label">Режиссёр:</span><span class="technical-value">${tech.director || 'Сергей Давыдов'}</span></div>
                </div></div>
                <div class="similar-section"><div class="similar-header"><h3 class="similar-title">Похожие спектакли</h3></div><div class="similar-grid" id="similarGrid"></div></div>
            `;
            container.innerHTML = html;

            // Заполняем "похожие" из тех же данных, исключая текущий
            const similarGrid = document.getElementById('similarGrid');
            if (similarGrid) {
                let similarHtml = '';
                Object.entries(performancesData).forEach(([id, p]) => {
                    if (parseInt(id) === perfId) return;
                    similarHtml += `<div class="similar-card"><img class="similar-img" src="${p.poster.replace('540x720','427x220')}" alt="${p.title}"><div class="similar-content"><div class="similar-tags"><span class="similar-tag">${p.age}</span></div><h4 class="similar-name">${p.title}</h4><p class="similar-desc">${p.desc.substring(0,70)}…</p><div class="similar-footer"><span class="similar-price">от ${p.price}</span><button class="similar-btn" data-id="${id}">Подробнее</button></div></div></div>`;
                });
                similarGrid.innerHTML = similarHtml;
                document.querySelectorAll('.similar-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = btn.dataset.id;
                        window.location.href = `performance-details.html?id=${id}`;
                    });
                });
            }
        }
        renderDetails();

        // Кнопки покупки (делегирование)
        container.addEventListener('click', (e) => {
			// Проверяем, кликнули ли по основной кнопке "Купить билет" ИЛИ по кнопке в расписании
			const buyButton = e.target.closest('.buy-ticket-main') || e.target.closest('.schedule-buy');
			
			if (buyButton) {
				e.preventDefault();
				
				// 1. Определяем данные для передачи
				let selectedDateTime = 'Ближайшая дата'; 
				let selectedHall = 'Основной зал'; 

				// Если кликнули по конкретной строке расписания (.schedule-buy)
				if (buyButton.classList.contains('schedule-buy')) {
					const scheduleItem = buyButton.closest('.schedule-item');
					if (scheduleItem) {
						const dateEl = scheduleItem.querySelector('.schedule-date');
						const timeEl = scheduleItem.querySelector('.schedule-time');
						if (dateEl && timeEl) {
							selectedDateTime = `${dateEl.textContent}, ${timeEl.textContent}`;
						}
					}
				} else {
					// Если кликнули по главной кнопке, берем первый сеанс из данных
					if (data.schedule && data.schedule.length > 0) {
						const firstDate = data.schedule[0];
						selectedDateTime = `${firstDate.date}, ${firstDate.time}`;
					}
				}

				// 2. Формируем объект для отправки на checkout
				const orderInfo = {
					title: data.title,
					dateTime: selectedDateTime,
					hall: data.technical?.stage || 'Основная сцена',
					price: data.price,
					poster: data.poster // передаем постер
				};

				// 3. Сохраняем в localStorage
				localStorage.setItem('selectedPerformance', JSON.stringify(orderInfo));

				// 4. Переход на страницу оформления
				window.location.href = 'checkout.html';
			}
		});

        // Хедер / бургер
        const dots = document.getElementById('dotsIcon'), closeIc = document.getElementById('closeIcon'), extra = document.getElementById('extraMenuRow');
        if(dots) dots.addEventListener('click', ()=>{ extra.classList.add('open'); dots.style.display='none'; closeIc.style.display='inline-flex'; });
        if(closeIc) closeIc.addEventListener('click', ()=>{ extra.classList.remove('open'); dots.style.display='inline-flex'; closeIc.style.display='none'; });
        const burger = document.getElementById('burgerIcon'), mob = document.getElementById('mobileNav'), ov = document.getElementById('overlay'), clsMob = document.getElementById('closeMobileMenu');
        function openMob(){ mob.classList.add('open'); ov.classList.add('active'); document.body.style.overflow='hidden'; }
        function closeMob(){ mob.classList.remove('open'); ov.classList.remove('active'); document.body.style.overflow=''; }
        burger?.addEventListener('click', openMob); clsMob?.addEventListener('click', closeMob); ov?.addEventListener('click', closeMob);
        
        document.getElementById('subscribeBtn')?.addEventListener('click', ()=>{
            const chk = document.getElementById('consentCheckbox');
            if(!chk.checked) { document.getElementById('consentError').style.display='block'; setTimeout(()=> document.getElementById('consentError').style.display='none',2000); }
            else { alert('Подписка оформлена'); document.getElementById('subscribeEmail').value=''; chk.checked=false; }
        });
    })();
</script>
<script src="js/common.js"></script>
</body>
</html>
