<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Театр клоунады «Микос» | Заказчикам</title>
    <link rel="icon" type="image/svg+xml" href="SVG/logo-2.svg" sizes="any">
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ... все стили без изменений ... */
    </style>
</head>
<body>
    <!-- ... весь HTML-контент без изменений ... -->

    <script src="js/components-loader.js"></script>
    <script src="js/header-scripts.js"></script>
    <script src="js/common.js"></script>
    <script>
        // Флаги инициализации
        let customSelectsInitialized = false;
        let dateFieldInitialized = false;

        // Модальное окно, маски телефона, validateField – без изменений

        // ==================== КОНСТРУКТОР ЗАПРОСА ====================
        function updatePreview() {
            const name = document.getElementById('requestName').value || '—';
            const company = document.getElementById('requestCompany').value || '—';
            const email = document.getElementById('requestEmail').value || '—';
            const phone = document.getElementById('requestPhone').value || '—';
            const type = document.getElementById('eventType');
            const date = document.getElementById('eventDate').value || '—';
            const audience = document.getElementById('audienceCount');
            const format = document.getElementById('eventFormat');
            const wishes = document.getElementById('extraWishes').value || '—';
            const typeText = type.options[type.selectedIndex].text;
            const audienceText = audience.options[audience.selectedIndex].text;
            const formatText = format.options[format.selectedIndex].text;
            
            document.getElementById('previewContent').innerHTML = 
                `<div class="preview-item"><div class="preview-label">Имя</div><div class="preview-value">${escapeHtml(name)}</div></div>
                <div class="preview-item"><div class="preview-label">Компания</div><div class="preview-value">${escapeHtml(company)}</div></div>
                <div class="preview-item"><div class="preview-label">Email</div><div class="preview-value">${escapeHtml(email)}</div></div>
                <div class="preview-item"><div class="preview-label">Телефон</div><div class="preview-value">${escapeHtml(phone)}</div></div>
                <div class="preview-item"><div class="preview-label">Тип</div><div class="preview-value">${typeText}</div></div>
                <div class="preview-item"><div class="preview-label">Дата</div><div class="preview-value">${date}</div></div>
                <div class="preview-item"><div class="preview-label">Зрителей</div><div class="preview-value">${audienceText}</div></div>
                <div class="preview-item"><div class="preview-label">Формат</div><div class="preview-value">${formatText}</div></div>
                <div class="preview-item"><div class="preview-label">Пожелания</div><div class="preview-value">${escapeHtml(wishes)}</div></div>`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Кнопка "Сформировать запрос"
        document.getElementById('previewBtn')?.addEventListener('click', () => {
            let isValid = true;
            if (!validateField(document.getElementById('requestName'), 'name')) isValid = false;
            if (!validateField(document.getElementById('requestEmail'), 'email')) isValid = false;
            if (!validateField(document.getElementById('requestPhone'), 'phone')) isValid = false;
            
            if (!isValid) {
                const firstError = document.querySelector('.form-input-customers.error');
                if (firstError) {
                    firstError.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    firstError.focus();
                }
                return;
            }
            
            updatePreview();
            
            // На мобильных прокручиваем к превью
            if (window.innerWidth <= 768) {
                const preview = document.getElementById('builderPreview');
                if (preview) {
                    setTimeout(() => {
                        preview.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 100);
                }
            }
        });

        // Кнопка "Сбросить"
        document.getElementById('resetBtn')?.addEventListener('click', () => {
            document.getElementById('requestForm').reset();
            document.querySelectorAll('.form-input-customers.error, .form-input-customers.valid').forEach(el => {
                el.classList.remove('error', 'valid');
            });
            document.querySelectorAll('.custom-select-wrapper').forEach(wrapper => {
                const nativeSelect = wrapper.querySelector('select');
                const btn = wrapper.querySelector('.custom-select-btn');
                if (nativeSelect && btn && nativeSelect.options.length) {
                    btn.textContent = nativeSelect.options[nativeSelect.selectedIndex].text;
                }
            });
            const requestPhone = document.getElementById('requestPhone');
            if (requestPhone) requestPhone.value = '';
            
            // Сбрасываем превью к исходному состоянию
            document.getElementById('previewContent').innerHTML = 
                `<div class="preview-item"><div class="preview-label">Имя</div><div class="preview-value">—</div></div>
                <div class="preview-item"><div class="preview-label">Компания</div><div class="preview-value">—</div></div>
                <div class="preview-item"><div class="preview-label">Email</div><div class="preview-value">—</div></div>
                <div class="preview-item"><div class="preview-label">Телефон</div><div class="preview-value">—</div></div>
                <div class="preview-item"><div class="preview-label">Тип</div><div class="preview-value">—</div></div>
                <div class="preview-item"><div class="preview-label">Дата</div><div class="preview-value">—</div></div>
                <div class="preview-item"><div class="preview-label">Зрителей</div><div class="preview-value">—</div></div>
                <div class="preview-item"><div class="preview-label">Формат</div><div class="preview-value">—</div></div>
                <div class="preview-item"><div class="preview-label">Пожелания</div><div class="preview-value">—</div></div>`;
        });

        // Отправка запроса
        document.getElementById('sendRequestBtn')?.addEventListener('click', () => {
            // ... (без изменений) ...
        });

        // Инициализация масок и кастомных селектов
        applyPhoneMask(document.getElementById('requestPhone'));
        applyPhoneMask(document.getElementById('contactPhone'));
        // ... остальной код validateField, contactForm, initCustomSelects, initDateField ...

        // ==================== ДАТА: МАСКА + СКРЫТЫЙ ПИКЕР ====================
        function initDateField() {
            if (dateFieldInitialized) return;
            const dateInput = document.getElementById('eventDate');
            if (!dateInput) return;
            
            const wrapper = dateInput.closest('.date-input-wrapper');
            if (!wrapper) return;
            
            const hiddenDatePicker = document.createElement('input'); 
            hiddenDatePicker.type = 'date'; 
            hiddenDatePicker.className = 'hidden-date-picker'; 
            hiddenDatePicker.style.cssText = 'position: absolute; opacity: 0; pointer-events: none; width: 0; height: 0;';
            wrapper.appendChild(hiddenDatePicker);
            
            // Маска ввода (без автоматического обновления превью)
            dateInput.addEventListener('input', function(e) {
                let value = this.value.replace(/\D/g, ''); 
                if (value.length > 8) value = value.slice(0, 8);
                let formatted = ''; 
                if (value.length > 0) { 
                    formatted = value.slice(0, 2); 
                    if (value.length > 2) formatted += '.' + value.slice(2, 4); 
                    if (value.length > 4) formatted += '.' + value.slice(4, 8); 
                }
                this.value = formatted;
                // убрано: updatePreview();
            });
            dateInput.addEventListener('keydown', function(e) { 
                if (!/[0-9]/.test(e.key) && !['Backspace','Delete','ArrowLeft','ArrowRight','Tab','Escape','Enter'].includes(e.key)) e.preventDefault(); 
            });
            dateInput.addEventListener('blur', function() {
                const value = this.value.trim(); 
                if (!value) { this.classList.remove('error','valid'); return; }
                const regex = /^(\d{2})\.(\d{2})\.(\d{4})$/; 
                const match = value.match(regex);
                if (!match) { this.classList.add('error'); this.classList.remove('valid'); return; }
                const day = parseInt(match[1],10), month = parseInt(match[2],10), year = parseInt(match[3],10);
                const date = new Date(year, month-1, day);
                if (date.getDate() === day && date.getMonth() === month-1 && date.getFullYear() === year && year >= 2020 && year <= 2100) { 
                    this.classList.remove('error'); this.classList.add('valid'); 
                } else { 
                    this.classList.add('error'); this.classList.remove('valid'); 
                }
                // убрано: updatePreview();
            });
            dateInput.addEventListener('focus', function() { this.classList.remove('error','valid'); });
            
            // Открытие календаря
            dateInput.addEventListener('click', function(e) {
                // ... без изменений ...
            });
            
            hiddenDatePicker.addEventListener('change', function() { 
                if (this.value) { 
                    const [year, month, day] = this.value.split('-'); 
                    dateInput.value = `${day}.${month}.${year}`; 
                    dateInput.classList.add('valid'); 
                    dateInput.classList.remove('error'); 
                    // убрано: updatePreview();
                } 
                hiddenDatePicker.style.position = 'absolute'; 
                hiddenDatePicker.style.pointerEvents = 'none'; 
                hiddenDatePicker.style.width = '0'; 
                hiddenDatePicker.style.height = '0'; 
                hiddenDatePicker.style.opacity = '0'; 
            });
            // ...
            
            dateFieldInitialized = true;
        }

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        document.addEventListener('DOMContentLoaded', () => {
            // Первоначальное заполнение превью (черты)
            document.getElementById('previewContent').innerHTML = 
                `<div class="preview-item"><div class="preview-label">Имя</div><div class="preview-value">—</div></div>
                <div class="preview-item"><div class="preview-label">Компания</div><div class="preview-value">—</div></div>
                <div class="preview-item"><div class="preview-label">Email</div><div class="preview-value">—</div></div>
                <div class="preview-item"><div class="preview-label">Телефон</div><div class="preview-value">—</div></div>
                <div class="preview-item"><div class="preview-label">Тип</div><div class="preview-value">—</div></div>
                <div class="preview-item"><div class="preview-label">Дата</div><div class="preview-value">—</div></div>
                <div class="preview-item"><div class="preview-label">Зрителей</div><div class="preview-value">—</div></div>
                <div class="preview-item"><div class="preview-label">Формат</div><div class="preview-value">—</div></div>
                <div class="preview-item"><div class="preview-label">Пожелания</div><div class="preview-value">—</div></div>`;
            
            initCustomSelects();
            initDateField();
            
            // Важно: никаких автоматических слушателей input для обновления превью!
        });
    </script>
</body>
</html>
