<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Театр клоунады «Микос» | Афиша</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="SVG/logo-2.svg" sizes="any">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    
    <!-- Подключение Яндекс.Карт -->
    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU" type="text/javascript"></script>
    
    <style>
        /* ===== СТИЛИ КАРТЫ ГАСТРОЛЕЙ ===== */
        .tour-map-section {
            background: #fff;
            border-radius: 28px;
            outline: 1px solid #E5E5E5;
            padding: clamp(24px, 4vw, 40px);
            margin: clamp(40px, 6vw, 64px) 0;
        }
        
        .tour-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 32px;
        }
        
        .tour-title {
            font-family: 'Unbounded', sans-serif;
            font-size: clamp(24px, 3.5vw, 32px);
            font-weight: 700;
            color: #000;
            margin: 0;
        }
        
        .tour-all-link {
            font-family: 'Unbounded', sans-serif;
            font-size: clamp(12px, 1.5vw, 14px);
            font-weight: 600;
            color: #4A6294;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }
        .tour-all-link:hover { color: #E8454D; }
        
        .tour-map-container {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: clamp(20px, 4vw, 40px);
            align-items: start;
        }
        
        #yandexMap {
            width: 100%;
            height: 500px;
            border-radius: 16px;
            overflow: hidden;
            outline: 1px solid #E5E3E1;
            box-shadow: 0 4px 24px rgba(42,61,94,0.08);
        }
        
        .tour-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 8px;
        }
        
        .tour-list::-webkit-scrollbar {
            width: 6px;
        }
        .tour-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }
        .tour-list::-webkit-scrollbar-thumb {
            background: #4A6294;
            border-radius: 3px;
        }
        
        .tour-item {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            outline: 1px solid #E5E3E1;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .tour-item:hover {
            outline-color: #4A6294;
            box-shadow: 0 4px 16px rgba(42,61,94,0.08);
            transform: translateY(-2px);
        }
        .tour-item.active {
            outline-color: #E8454D;
            background: #FFF5F5;
        }
        
        .tour-city {
            font-family: 'Unbounded', sans-serif;
            font-size: clamp(13px, 1.5vw, 14px);
            font-weight: 600;
            color: #E8454D;
            margin-bottom: 4px;
        }
        
        .tour-dates {
            font-size: clamp(13px, 1.5vw, 14px);
            color: #2A2627;
            margin-bottom: 6px;
        }
        
        .tour-venue {
            font-size: clamp(13px, 1.5vw, 14px);
            color: #2A2627;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .tour-status {
            display: inline-block;
            margin-top: 10px;
            padding: 4px 14px;
            border-radius: 30px;
            font-family: 'Unbounded', sans-serif;
            font-size: clamp(11px, 1.3vw, 12px);
            font-weight: 600;
            background: #2A3D5E;
            color: #F8F7F6;
            min-width: clamp(80px, 9vw, 90px);
            text-align: center;
        }
        .tour-status.sold { background: #2A2627; }
        .tour-status.soon { background: #F8F7F6; color: #1A1A1A; outline: 1px solid #ddd; }
        
        .tour-all-link-bottom {
            text-align: right;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #E9ECEF;
        }
        
        /* Кнопка "Показать еще" */
        .show-more-wrapper {
            display: flex;
            justify-content: center;
            margin: 24px 0 0;
        }
        .show-more-btn {
            padding: clamp(10px, 1.5vw, 12px) clamp(24px, 4vw, 40px);
            background: #F8F7F6;
            border-radius: 8px;
            border: none;
            font-family: 'Unbounded', sans-serif;
            font-weight: 600;
            font-size: clamp(13px, 1.5vw, 14px);
            color: #1A1718;
            cursor: pointer;
            transition: background 0.2s;
            outline: none;
        }
        .show-more-btn:hover { background: #E9E7E5; }
        .show-more-btn:active { background: #DCE4F0; }
        
        /* Стили для балуна Яндекс.Карт */
        .balloon-content b {
            font-family: 'Unbounded', sans-serif;
            color: #1A1718;
            font-size: 16px;
            display: block;
            margin-bottom: 6px;
        }
        .balloon-content .date {
            color: #5A5556;
            font-size: 14px;
            display: block;
            margin: 4px 0;
        }
        .balloon-content .venue {
            color: #3D393A;
            font-size: 13px;
            display: block;
            margin: 6px 0;
        }
        .balloon-content .status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 6px;
        }
        .balloon-content .status.available { background: #E8F5E9; color: #2E7D32; }
        .balloon-content .status.soon { background: #FFF3E0; color: #E65100; }
        .balloon-content .status.sold { background: #F5F5F5; color: #616161; }
        
        /* Адаптивность */
        @media (max-width: 1100px) {
            .tour-map-container {
                grid-template-columns: 1fr;
            }
            #yandexMap {
                height: 400px;
            }
            .tour-list {
                max-height: 300px;
            }
        }
        
        @media (max-width: 860px) {
            .tour-map-section {
                padding: 24px 16px;
                margin: 40px 0;
            }
            .tour-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .tour-title {
                font-size: 28px;
            }
            #yandexMap {
                height: 300px;
            }
            .tour-list {
                max-height: none;
                overflow-y: visible;
                padding-right: 0;
            }
            /* Скрываем все элементы списка кроме первых 4 */
            .tour-item.mobile-hidden {
                display: none;
            }
            .tour-all-link-bottom {
                display: none;
            }
            /* Показываем кнопку "Показать еще" на мобильных */
            .show-more-wrapper {
                display: block !important;
            }
        }
        
        @media (max-width: 480px) {
            .tour-map-section {
                padding: 20px 12px;
                margin: 32px 0;
            }
            .tour-title {
                font-size: 24px;
            }
            #yandexMap {
                height: 250px;
            }
            .tour-item {
                padding: 14px;
            }
            .tour-city {
                font-size: 13px;
            }
            .tour-dates,
            .tour-venue {
                font-size: 12px;
            }
            .tour-status {
                font-size: 11px;
                padding: 3px 12px;
            }
        }
        
        /* Стили для модального окна (если нужно) */
        .DivModalContent {
            width: 1098px;
            max-width: 95vw;
            max-height: 90vh;
            background: #DCE4F0;
            border-radius: 24px;
            padding: clamp(20px, 4vw, 40px) clamp(30px, 5vw, 60px);
            position: relative;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,.1);
        }
        .ButtonModalClose {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: clamp(24px, 3.5vw, 32px);
            cursor: pointer;
            background: 0 0;
            border: none;
            color: #000;
        }
        .DivModalHeader {
            border-bottom: 1px solid #2A3D5E;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .DivModalHeader .H2 {
            border-left: 3px solid #E8454D;
            padding-left: 16px;
            font-family: 'Unbounded', sans-serif;
            font-size: clamp(24px, 3.5vw, 32px);
            font-weight: 700;
            color: #000;
            margin-bottom: 8px;
        }
        .DivModalHeader .P {
            color: #2A3D5E;
            font-size: clamp(14px, 1.8vw, 16px);
        }
        .DivModalTourList {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .DivModalTourItem {
            background: #fff;
            border-radius: 24px;
            padding: clamp(14px, 2vw, 20px) clamp(20px, 3vw, 30px);
            display: flex;
            align-items: center;
            gap: clamp(20px, 4vw, 40px);
            flex-wrap: wrap;
        }
        .SpanModalTourCity {
            width: clamp(120px, 15vw, 160px);
            font-family: 'Unbounded', sans-serif;
            font-weight: 700;
            font-size: clamp(16px, 2.5vw, 20px);
            color: #E8454D;
        }
        .DivModalTourDates {
            flex: 1;
        }
        .DivModalTourDates .Strong {
            font-weight: 700;
            font-size: clamp(14px, 1.8vw, 16px);
            margin-bottom: 6px;
        }
        .SpanModalTourVenue {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #2A3D5E;
            font-size: clamp(13px, 1.5vw, 14px);
        }
        .SpanTourStatus {
            padding: 4px 14px;
            background: #2A3D5E;
            border-radius: 30px;
            color: #F8F7F6;
            font-family: 'Unbounded', sans-serif;
            font-weight: 600;
            font-size: clamp(11px, 1.3vw, 12px);
            min-width: 90px;
            text-align: center;
        }
        .SpanTourStatus.sold { background: #2A2627; }
        .SpanTourStatus.soon { background: #F8F7F6; color: #1A1A1A; outline: 1px solid #ddd; }
        .DivModalFooter {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #2A3D5E;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #000;
            font-size: 14px;
        }
        .ModalBackgroundImage {
            position: absolute;
            width: 453px;
            height: 594px;
            right: 0;
            top: -357px;
            pointer-events: none;
            z-index: 0;
        }

        /* ===== СТИЛИ ДЛЯ АНИМАЦИИ ПРОМОКОДА ===== */
        .promo-runner-section {
            position: relative;
            width: 100%;
            height: 520px; /* Увеличена высота в 3 раза (было 120px) */
            overflow: hidden; /* Скрываем всё, что выходит за пределы */
            
            border-radius: 16px;
            margin: 0px 0;
            display: flex;
            align-items: center;
            user-select: none;
        }

        .promo-runner-track {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            left: 100%; /* Старт строго от правой границы (за пределами контейнера) */
            width: 800px; /* Увеличена ширина в ~3 раза (было 150px) */
            height: 650px; /* Увеличена высота в 3 раза (было 100px) */
            cursor: pointer;
            z-index: 10;
            transition: none;
            /* Персонаж изначально невидим за правой границей */
        }

        /* Класс, запускающий анимацию бега справа налево */
        .promo-runner-track.running {
            animation: runAcross 4s linear infinite;
        }

        /* Ключевые кадры: персонаж бежит от правой границы к левой */
        @keyframes runAcross {
            0% {
                left: 100%; /* Начинаем за правой границей контейнера */
            }
            100% {
                left: -850px; /* Заканчиваем за левой границей (на ширину самого персонажа) */
            }
        }

        .promo-runner-track img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            /* Лёгкий наклон для динамики бега */
            transform: rotate(-5deg);
            filter: drop-shadow(4px 8px 12px rgba(0,0,0,0.15)); /* Добавляем тень для объёма */
        }

        /* Подпись под анимацией */
        .promo-caption {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Nunito Sans', sans-serif;
            font-size: 18px; /* Немного увеличен шрифт подписи */
            font-weight: 600;
            color: #4A6294;
            background: rgba(255,255,255,0.9);
            padding: 8px 24px;
            border-radius: 20px;
            white-space: nowrap;
            z-index: 5;
            pointer-events: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* Модальное окно промокода */
        .promo-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .promo-modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .promo-modal {
            background: #fff;
            border-radius: 24px;
            padding: clamp(24px, 4vw, 40px);
            max-width: 480px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            position: relative;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }
        .promo-modal-overlay.active .promo-modal {
            transform: translateY(0);
        }

        .promo-modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #888;
            line-height: 1;
        }
        .promo-modal-close:hover { color: #E8454D; }

        .promo-modal-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .promo-modal-title {
            font-family: 'Unbounded', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: #1A1718;
            margin-bottom: 8px;
        }

        .promo-modal-subtitle {
            font-family: 'Nunito Sans', sans-serif;
            color: #5A5556;
            margin-bottom: 24px;
            font-size: 16px;
        }

        .promo-code-box {
            background: #F8F7F6;
            border: 2px dashed #4A6294;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .promo-code-text {
            font-family: 'Unbounded', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: #E8454D;
            letter-spacing: 2px;
        }

        .promo-copy-btn {
            background: #4A6294;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-family: 'Unbounded', sans-serif;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .promo-copy-btn:hover { background: #2A3D5E; }
        .promo-copy-btn.copied { background: #2E7D32; }

        .promo-goto-btn {
            display: inline-block;
            background: #E8454D;
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px 32px;
            font-family: 'Unbounded', sans-serif;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .promo-goto-btn:hover { background: #C0392B; color: #fff; }

        /* Адаптивность для мобильных */
        @media (max-width: 860px) {
            .promo-runner-section {
                height: 240px; /* Уменьшаем, но остаётся крупнее оригинала */
            }
            .promo-runner-track {
                width: 300px;
                height: 200px;
            }
            @keyframes runAcross {
                0% { left: 100%; }
                100% { left: -300px; }
            }
            .promo-caption {
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            .promo-runner-section {
                height: 200px;
            }
            .promo-runner-track {
                width: 240px;
                height: 160px;
            }
            @keyframes runAcross {
                0% { left: 100%; }
                100% { left: -240px; }
            }
            .promo-caption {
                font-size: 14px;
                padding: 6px 16px;
            }
            .promo-code-box {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div class="shop-container">
    <!-- HEADER -->
    <div id="site-header"></div>

    <div class="overlay" id="overlay"></div>

    <!-- Hero слайдер -->
    <div id="site-hero-slider"></div>

    <!-- АНИМАЦИЯ ПРОМОКОДА: БЕГУЩИЙ ПЕРСОНАЖ (УВЕЛИЧЕНО В 3 РАЗА) -->
        <div class="promo-runner-section" id="promoRunner">
            <!-- Дорожка с персонажем (изначально без анимации, запустится при скролле) -->
            <div class="promo-runner-track" id="promoRunnerTrack">
                <!-- Используем SVG из папки SVG -->
                <img src="SVG/Промокод.svg" alt="Поймай Ксюшу — получи промокод!">
            </div>
            <span class="promo-caption"> Поймайте Ксюшу — получите промокод!</span>
        </div>

        <!-- Модальное окно промокода -->
        <div class="promo-modal-overlay" id="promoModalOverlay">
            <div class="promo-modal">
                <button class="promo-modal-close" id="closePromoModal">×</button>
                <div class="promo-modal-icon">🎪</div>
                <h2 class="promo-modal-title">Вы поймали Ксюшу!</h2>
                <p class="promo-modal-subtitle">Ваш персональный промокод - 15% на спектакль:</p>
                <div class="promo-code-box">
                    <span class="promo-code-text" id="promoCode">KSUSHA10</span>
                    <button class="promo-copy-btn" id="copyPromoBtn">
                        <i class="far fa-copy"></i> Скопировать
                    </button>
                </div>
                <a href="#afisha" class="promo-goto-btn" id="gotoAfishaBtn">
                    Перейти к афише <i class="fas fa-arrow-right"></i>
                </a>
            </div>
        </div>
    </div>

    <!-- Основной контент афиши -->
    <div class="afisha-page">
        <div class="filters-section-afisha">
            <div class="filter-chips-afisha" id="filterChipsAfisha">
                <div class="filter-chip-afisha active" data-filter="all">Все события</div>
                <div class="filter-chip-date">
                    <select id="monthSelect" class="month-select"></select>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
        </div>

        <div class="events-grid" id="eventsGrid"></div>

        <div class="load-more-wrapper">
            <button class="load-more-btn" id="showMoreEventsBtn">Показать еще</button>
        </div>

        <!-- Карта гастролей с Яндекс.Картой -->
        <div class="tour-map-section">
            <div class="tour-header">
                <h2 class="tour-title">Карта гастролей</h2>
                <a href="#" class="tour-all-link">Вся афиша <i class="fas fa-arrow-right"></i></a>
            </div>
            <div class="tour-map-container">
                <!-- Контейнер для Яндекс.Карты -->
                <div id="yandexMap"></div>
                
                <!-- Список городов -->
                <div class="tour-list" id="tourList">
                    <!-- Генерируется через JS -->
                </div>
            </div>
            
            <!-- Кнопка "Показать еще" (видна только на мобильных) -->
            <div class="show-more-wrapper">
                <button class="show-more-btn" id="showMorePerformancesBtn" style="display: none;">Показать еще</button>
            </div>
        </div>

        

    <!-- Модальное окно "Все гастроли" -->
    <div class="modal-overlay" id="tourModalOverlay">
        <div class="DivModalContent">
            <button class="ButtonModalClose" id="closeTourModal">×</button>
            <div class="DivModalHeader">
                <div class="H2">
                    <div>Все гастроли театра</div>
                </div>
                <div class="P">
                    <div>12 городов, 28 показов. Выберите удобный город и дату.</div>
                </div>
            </div>
            <div class="DivModalTourList" id="modalTourListContainer">
                <!-- Список будет сгенерирован через JS -->
            </div>
            <div class="DivModalFooter">
                <i class="fas fa-ticket-alt"></i>
                <span>Билеты поступают в продажу за 30 дней до показа</span>
            </div>
            <img class="ModalBackgroundImage" src="https://placehold.co/453x594" alt="Decor" />
        </div>
    </div>

    <!-- FOOTER -->
    <div id="site-footer"></div>
</div>

<!-- СКРИПТЫ -->
<script src="js/components-loader.js"></script>
<script src="js/header-scripts.js"></script>
<script src="js/common.js"></script>
<script src="js/slider-scripts.js"></script>

<script>
// =============================================
// ДАННЫЕ

let myMap;
let placemarks = [];

// =============================================
// ИНИЦИАЛИЗАЦИЯ ЯНДЕКС.КАРТЫ
// =============================================
function initYandexMap() {
    if (typeof ymaps === 'undefined') {
        console.error('Yandex Maps API not loaded');
        return;
    }
    
    ymaps.ready(function() {
        // Создание карты
        myMap = new ymaps.Map("yandexMap", {
            center: [60, 80], // Центр России
            zoom: 4,
            controls: ['zoomControl', 'geolocationControl']
        });
        
        // Добавление меток для каждого города
        tourData.forEach((item, index) => {
            // Определение цвета метки в зависимости от статуса
            let preset = 'islands#redCircleIcon';
            if (item.statusClass === 'sold') {
                preset = 'islands#grayCircleIcon';
            } else if (item.statusClass === 'soon') {
                preset = 'islands#orangeCircleIcon';
            }
            
            // Создание метки
            const placemark = new ymaps.Placemark(item.coords, {
                hintContent: item.city,
                balloonContent: `
                    <div class="balloon-content">
                        <b>${item.city}</b>
                        <span class="date">📅 ${item.dates}</span>
                        <span class="venue">🎭 ${item.venue}</span>
                        <span class="status ${item.statusClass}">${item.status}</span>
                    </div>
                `
            }, {
                preset: preset,
                iconColor: item.statusClass === 'sold' ? '#6C757D' : (item.statusClass === 'soon' ? '#F4A261' : '#E8454D')
            });
            
            myMap.geoObjects.add(placemark);
            placemarks.push(placemark);
            
            // Добавление обработчика клика
            placemark.events.add('click', function() {
                highlightTourItem(index);
            });
        });
        
        // Отображение всех меток в границах карты
        myMap.setBounds(myMap.geoObjects.getBounds(), {
            checkZoomRange: true,
            zoomMargin: 50
        });
        
        // Генерация списка городов
        renderTourList();
    });
}

// =============================================
// ОТРИСОВКА СПИСКА ГОРОДОВ
// =============================================
function renderTourList(showAll = false) {
    const tourList = document.getElementById('tourList');
    const showMoreBtn = document.getElementById('showMorePerformancesBtn');
    if (!tourList) return;
    
    // Определяем, мобильная ли версия
    const isMobile = window.innerWidth <= 860;
    
    tourList.innerHTML = '';
    
    // На мобильных показываем только первые 4 элемента, если не нажата кнопка "Показать еще"
    const itemsToShow = (isMobile && !showAll) ? tourData.slice(0, 4) : tourData;
    
    itemsToShow.forEach((item, index) => {
        const tourItem = document.createElement('div');
        tourItem.className = 'tour-item';
        if (isMobile && index >= 4 && !showAll) {
            tourItem.classList.add('mobile-hidden');
        }
        tourItem.dataset.index = index;
        tourItem.innerHTML = `
            <div class="tour-city">${item.city}</div>
            <div class="tour-dates"><span>${item.dates}</span></div>
            <div class="tour-venue"><i class="fas fa-map-marker-alt"></i> ${item.venue}</div>
            <div class="tour-status ${item.statusClass}">${item.status}</div>
        `;
        
        // Обработчик клика
        tourItem.addEventListener('click', function() {
            highlightTourItem(index);
        });
        
        tourList.appendChild(tourItem);
    });
    
    // Управление кнопкой "Показать еще"
    if (showMoreBtn) {
        if (isMobile && tourData.length > 4) {
            showMoreBtn.style.display = 'block';
            showMoreBtn.textContent = showAll ? 'Скрыть' : 'Показать еще';
        } else {
            showMoreBtn.style.display = 'none';
        }
    }
}

// =============================================
// ПОДСВЕТКА ЭЛЕМЕНТА СПИСКА И ЦЕНТРИРОВАНИЕ НА МЕТКЕ
// =============================================
function highlightTourItem(index) {
    // Убираем подсветку со всех элементов
    document.querySelectorAll('.tour-item').forEach(item => {
        item.classList.remove('active');
    });
    
    // Подсвечиваем текущий
    const currentItem = document.querySelector(`.tour-item[data-index="${index}"]`);
    if (currentItem) {
        currentItem.classList.add('active');
        currentItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    
    // Центрируем карту на метке
    if (placemarks[index]) {
        myMap.setCenter(placemarks[index].geometry.getCoordinates(), 10);
        placemarks[index].balloon.open();
    }
}

// =============================================
// ИНИЦИАЛИЗАЦИЯ СЕЛЕКТА МЕСЯЦЕВ
// =============================================
function populateMonthSelect() {
    const months = ['январь', 'февраль', 'март', 'апрель', 'май', 'июнь', 'июль', 'август', 'сентябрь', 'октябрь', 'ноябрь', 'декабрь'];
    const today = new Date();
    const currentYear = today.getFullYear();
    const currentMonthIndex = today.getMonth();
    
    let optionsHtml = '';
    for (let i = 0; i < 12; i++) {
        const monthIdx = (currentMonthIndex + i) % 12;
        const year = currentYear + Math.floor((currentMonthIndex + i) / 12);
        const monthName = months[monthIdx];
        const displayText = monthName.charAt(0).toUpperCase() + monthName.slice(1) + ' ' + year;
        const value = `${monthName}-${year}`;
        const selected = (i === 0) ? 'selected' : '';
        optionsHtml += `<option value="${value}" ${selected}>${displayText}</option>`;
    }
    monthSelect.innerHTML = optionsHtml;
}

// =============================================
// ФИЛЬТРАЦИЯ СОБЫТИЙ
// =============================================
function getFilteredEvents() {
    if (currentFilter === 'all') return events;
    const [month, year] = currentFilter.split('-');
    return events.filter(ev => ev.monthKey === month && ev.year === parseInt(year));
}

function updateFilterVisuals() {
    allChip.classList.toggle('active', currentFilter === 'all');
    monthSelect.classList.toggle('active-filter', currentFilter !== 'all');
    
    if (currentFilter !== 'all') {
        monthSelect.value = currentFilter;
    } else {
        monthSelect.selectedIndex = 0;
    }
    
    const customTrigger = document.querySelector('.custom-month-trigger');
    if (customTrigger) {
        customTrigger.classList.toggle('active', currentFilter !== 'all');
    }
}

// =============================================
// КАСТОМНЫЙ ВЫПАДАЮЩИЙ СПИСОК
// =============================================
function initCustomMonthSelect() {
    const originalSelect = document.getElementById('monthSelect');
    if (!originalSelect) return;
    if (document.querySelector('.custom-month-select')) return;
    
    originalSelect.style.display = 'none';
    
    const wrapper = document.createElement('div');
    wrapper.className = 'custom-month-select';
    
    const trigger = document.createElement('div');
    trigger.className = 'custom-month-trigger';
    
    const getSelectedText = () => {
        const selected = originalSelect.options[originalSelect.selectedIndex];
        return selected ? selected.text : 'Апрель 2026';
    };
    
    trigger.innerHTML = `${getSelectedText()} <span class="arrow-icon">▾</span>`;
    
    if (originalSelect.classList.contains('active-filter')) {
        trigger.classList.add('active');
    }
    
    const dropdown = document.createElement('div');
    dropdown.className = 'custom-month-dropdown';
    
    function renderOptions() {
        dropdown.innerHTML = '';
        Array.from(originalSelect.options).forEach((option) => {
            const optionEl = document.createElement('div');
            optionEl.className = 'custom-month-option';
            if (option.selected) optionEl.classList.add('selected');
            optionEl.textContent = option.text;
            optionEl.dataset.value = option.value;
            
            const selectHandler = (e) => {
                e.stopPropagation();
                e.preventDefault();
                
                originalSelect.value = optionEl.dataset.value;
                trigger.innerHTML = `${optionEl.textContent} <span class="arrow-icon">▾</span>`;
                
                const isFirstOption = originalSelect.selectedIndex === 0;
                if (!isFirstOption) {
                    originalSelect.classList.add('active-filter');
                    trigger.classList.add('active');
                } else {
                    originalSelect.classList.remove('active-filter');
                    trigger.classList.remove('active');
                }
                
                dropdown.querySelectorAll('.custom-month-option').forEach(opt => opt.classList.remove('selected'));
                optionEl.classList.add('selected');
                
                wrapper.classList.remove('open');
                originalSelect.dispatchEvent(new Event('change', { bubbles: true }));
            };
            
            optionEl.addEventListener('click', selectHandler);
            optionEl.addEventListener('touchstart', selectHandler, { passive: false });
            
            dropdown.appendChild(optionEl);
        });
    }
    
    renderOptions();
    
    const toggleHandler = (e) => {
        e.stopPropagation();
        e.preventDefault();
        
        document.querySelectorAll('.custom-month-select.open').forEach(el => {
            if (el !== wrapper) el.classList.remove('open');
        });
        
        wrapper.classList.toggle('open');
    };
    
    trigger.addEventListener('click', toggleHandler);
    trigger.addEventListener('touchstart', toggleHandler, { passive: false });
    
    document.addEventListener('click', (e) => {
        if (!wrapper.contains(e.target)) wrapper.classList.remove('open');
    });
    
    document.addEventListener('touchstart', (e) => {
        if (!wrapper.contains(e.target)) wrapper.classList.remove('open');
    }, { passive: true });
    
    dropdown.addEventListener('click', (e) => e.stopPropagation());
    dropdown.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: false });
    
    wrapper.appendChild(trigger);
    wrapper.appendChild(dropdown);
    originalSelect.parentNode.insertBefore(wrapper, originalSelect);
    
    if (allChip) {
        const resetHandler = () => {
            originalSelect.selectedIndex = 0;
            originalSelect.classList.remove('active-filter');
            trigger.classList.remove('active');
            trigger.innerHTML = `${originalSelect.options[0].text} <span class="arrow-icon">▾</span>`;
            
            dropdown.querySelectorAll('.custom-month-option').forEach(opt => {
                opt.classList.toggle('selected', opt.dataset.value === originalSelect.value);
            });
            wrapper.classList.remove('open');
        };
        
        allChip.addEventListener('click', resetHandler);
        allChip.addEventListener('touchstart', resetHandler, { passive: true });
    }
    
    const observer = new MutationObserver(() => {
        const newText = getSelectedText();
        trigger.innerHTML = `${newText} <span class="arrow-icon">▾</span>`;
        trigger.classList.toggle('active', originalSelect.classList.contains('active-filter'));
        
        const selectedValue = originalSelect.value;
        dropdown.querySelectorAll('.custom-month-option').forEach(opt => {
            opt.classList.toggle('selected', opt.dataset.value === selectedValue);
        });
    });
    
    observer.observe(originalSelect, { attributes: true, attributeFilter: ['class', 'value'] });
    
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && wrapper.classList.contains('open')) {
            wrapper.classList.remove('open');
        }
    });
    
    document.addEventListener('touchstart', (e) => {
        if (wrapper.classList.contains('open')) {
            if (!wrapper.contains(e.target)) {
                wrapper.classList.remove('open');
            }
        }
    }, { passive: true });
    
    document.addEventListener('click', (e) => {
        if (wrapper.classList.contains('open')) {
            if (!wrapper.contains(e.target)) {
                wrapper.classList.remove('open');
            }
        }
    });
    
    window.addEventListener('popstate', () => {
        if (wrapper.classList.contains('open')) {
            wrapper.classList.remove('open');
        }
    });
    
    dropdown.addEventListener('touchmove', (e) => {
        e.stopPropagation();
    }, { passive: false });
}

function initTourModal() {

    const modalListContainer = document.getElementById('modalTourListContainer');
    
    if (!modalOverlay) return;
    
    function renderTourModal() {
        let html = '';
        tourData.forEach(item => {
            const statusClass = item.statusClass ? ` ${item.statusClass}` : '';
            html += `
                <div class="DivModalTourItem">
                    <div class="SpanModalTourCity"><div>${item.city}</div></div>
                    <div class="DivModalTourDates">
                        <div class="Strong"><div>${item.dates}</div></div>
                        <div class="SpanModalTourVenue">
                            <i class="fas fa-map-marker-alt"></i>
                            <span>${item.venue}</span>
                        </div>
                    </div>
                    <div class="SpanTourStatus${statusClass}">${item.status}</div>
                </div>
            `;
        });
        modalListContainer.innerHTML = html;
    }
    
    renderTourModal();
    
    const openModal = (e) => { e?.preventDefault(); modalOverlay.classList.add('active'); document.body.style.overflow = 'hidden'; };
    const closeModal = () => { modalOverlay.classList.remove('active'); document.body.style.overflow = ''; };
    
    openModalLink?.addEventListener('click', openModal);
    openModalLink?.addEventListener('touchstart', openModal, { passive: false });
    closeModalBtn?.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });
}

        });
    }, {
        threshold: 0.3 // Анимация запустится, когда 30% секции будет видно
    });
    
    observer.observe(runnerSection);
    
    // Клик по персонажу открывает модальное окно
    runnerTrack.addEventListener('click', (e) => {
        e.stopPropagation();
        if (modalOverlay) {
            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
            // Сбрасываем текст кнопки копирования
            if (copyBtn) {
                copyBtn.innerHTML = '<i class="far fa-copy"></i> Скопировать';
                copyBtn.classList.remove('copied');
            }
        }
    });
    
    // Закрытие модального окна
    if (closeModalBtn && modalOverlay) {
        closeModalBtn.addEventListener('click', () => {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';
        });
        
        // Закрытие по клику на оверлей
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) {
                modalOverlay.classList.remove('active');
                document.body.style.overflow = '';
            }
        });
    }
    
    // Копирование промокода
    if (copyBtn && promoCodeText) {
        copyBtn.addEventListener('click', () => {
            const code = promoCodeText.textContent.trim();
            
            // Используем современный Clipboard API
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(code).then(() => {
                    copyBtn.innerHTML = '<i class="fas fa-check"></i> Скопировано!';
                    copyBtn.classList.add('copied');
                    
                    setTimeout(() => {
                        copyBtn.innerHTML = '<i class="far fa-copy"></i> Скопировать';
                        copyBtn.classList.remove('copied');
                    }, 2500);
                }).catch(() => {
                    // Fallback
                    fallbackCopy(code);
                });
            } else {
                fallbackCopy(code);
            }
        });
    }
    
    // Fallback-метод копирования для старых браузеров
    function fallbackCopy(text) {
        const tempInput = document.createElement('textarea');
        tempInput.value = text;
        tempInput.style.position = 'fixed';
        tempInput.style.opacity = '0';
        tempInput.style.left = '-9999px';
        document.body.appendChild(tempInput);
        tempInput.select();
        tempInput.setSelectionRange(0, 99999);
        
        try {
            document.execCommand('copy');
            copyBtn.innerHTML = '<i class="fas fa-check"></i> Скопировано!';
            copyBtn.classList.add('copied');
        } catch (err) {
            alert('Не удалось скопировать. Промокод: ' + text);
        }
        
        document.body.removeChild(tempInput);
        
        setTimeout(() => {
            if (copyBtn) {
                copyBtn.innerHTML = '<i class="far fa-copy"></i> Скопировать';
                copyBtn.classList.remove('copied');
            }
        }, 2500);
    }
    
    // Кнопка "Перейти к афише" — скроллит к фильтрам и закрывает модалку
    if (gotoAfishaBtn) {
        gotoAfishaBtn.addEventListener('click', (e) => {
            e.preventDefault();
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';
            
            // Скроллим к секции фильтров
            const filtersSection = document.querySelector('.filters-section-afisha');
            if (filtersSection) {
                filtersSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } else {
                // Fallback: скроллим к сетке событий
                const eventsGrid = document.getElementById('eventsGrid');
                if (eventsGrid) {
                    eventsGrid.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }
        });
    }
    
    // Закрытие модального окна по клавише Escape
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modalOverlay && modalOverlay.classList.contains('active')) {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }
    });
}

// =============================================
// ОБРАБОТЧИКИ ФИЛЬТРОВ
// =============================================
function initFilters() {
    allChip.addEventListener('click', () => {
        currentFilter = 'all';
        visibleCount = 6;
        renderEvents();
    });
    
    monthSelect.addEventListener('change', (e) => {
        currentFilter = e.target.value;
        visibleCount = 6;
        renderEvents();
    });
    
    showMoreBtn.addEventListener('click', () => {
        const filtered = getFilteredEvents();
        if (visibleCount < filtered.length) {
            visibleCount = Math.min(visibleCount + 3, filtered.length);
            renderEvents();
        }
    });
}

// =============================================
// ОБРАБОТЧИК КНОПКИ "ПОКАЗАТЬ ЕЩЕ" ДЛЯ СПИСКА ГОРОДОВ
// =============================================
function initShowMoreTourBtn() {
    const showMoreBtn = document.getElementById('showMorePerformancesBtn');
    if (!showMoreBtn) return;
    
    let showAllTours = false;
    
    showMoreBtn.addEventListener('click', function() {
        showAllTours = !showAllTours;
        renderTourList(showAllTours);
    });
    
    // Перерисовка при изменении размера окна
    window.addEventListener('resize', function() {
        renderTourList(showAllTours);
    });
}

// =============================================
// ЗАПУСК ВСЕГО
// =============================================
(function init() {
    populateMonthSelect();
    initFilters();
    initTourModal();
    initHeader();
    renderEvents();
    
    setTimeout(initCustomMonthSelect, 50);
    
    // Инициализация Яндекс.Карты после загрузки DOM
    setTimeout(initYandexMap, 100);
    
    // Инициализация кнопки "Показать еще" для списка городов
    setTimeout(initShowMoreTourBtn, 150);
    
    // Инициализация анимации промокода
    setTimeout(initPromoRunner, 200);
})();
</script>
